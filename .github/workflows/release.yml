name: Release

# Triggered manually. Builds all platform gems from the current commit, and —
# only if every build succeeds — creates a git tag, GitHub Release with
# changelog and gems, and publishes to RubyGems. Tagging happens atomically
# with the GitHub Release via `gh release create --target`, so a failed build
# never leaves an orphan tag on the remote.
on:
  workflow_dispatch:

jobs:
  # Read version from version.rb. Tag creation is deferred to the publish job.
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          VERSION=$(ruby -e "require_relative 'lib/carbon_fiber/version'; print CarbonFiber::VERSION")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  # Linux: cross-compile each platform in its own job so per-platform .so
  # files in lib/ never overlap. Single-job sequential cross-compile would
  # clobber earlier outputs because build.zig writes to a path keyed by
  # ruby_version only — not by platform.
  linux:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - aarch64-linux
          - x86_64-linux-musl
          - aarch64-linux-musl
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Cross-compile and package ${{ matrix.platform }}
        run: bundle exec rake cross:linux:${{ matrix.platform }} gem:${{ matrix.platform }}

      - uses: actions/upload-artifact@v7
        with:
          name: gems-${{ matrix.platform }}
          path: pkg/*.gem

  # macOS: native build for arm64-darwin. x86_64-darwin is not supported as
  # a precompiled gem — Intel Mac users get the source gem + pure-Ruby fallback.
  macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Install Zig
        run: |
          ZIG_ARCH=$(uname -m | sed 's/arm64/aarch64/')
          ZIG_VERSION="0.15.2"
          curl -sSfL "https://ziglang.org/download/${ZIG_VERSION}/zig-${ZIG_ARCH}-macos-${ZIG_VERSION}.tar.xz" \
            | tar xJ -C /tmp
          echo "/tmp/zig-${ZIG_ARCH}-macos-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: Fetch Zig dependencies
        run: zig build --fetch

      # Compile under each Ruby version. setup-ruby replaces the Ruby on PATH;
      # rake compile builds a .bundle for whichever Ruby is current.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Compile for Ruby 3.4
        run: bundle exec rake compile

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Compile for Ruby 4.0
        run: bundle exec rake compile

      # Defense-in-depth check on top of the Rakefile post-processing: smoke
      # tests run on the build runner, where any leaked absolute path still
      # resolves locally and would mask the bug. This step inspects the linker
      # metadata directly so a regression cannot ship.
      - name: Verify bundle install_names are portable
        run: |
          set -euo pipefail
          fail=0
          for bundle in lib/carbon_fiber/*/carbon_fiber_native.bundle; do
            echo "::group::$bundle"
            otool -L "$bundle"
            otool -l "$bundle" | grep -A2 LC_RPATH || true
            echo "::endgroup::"
            if otool -L "$bundle" | tail -n +2 | grep -E '^\s+/' | grep -vE '^\s+(/usr/lib/|/System/)'; then
              echo "::error::Non-portable LC_LOAD_DYLIB in $bundle"
              fail=1
            fi
            if otool -l "$bundle" | awk '/LC_RPATH/{f=1} f && /path /{print; f=0}' | grep -E 'path /'; then
              echo "::error::Non-portable LC_RPATH in $bundle"
              fail=1
            fi
          done
          exit $fail

      - name: Build platform gem
        run: bundle exec rake gem:arm64-darwin

      - name: Smoke-test installed gem
        run: |
          gem install pkg/carbon_fiber-*-arm64-darwin.gem
          ruby -e '
            require "carbon_fiber"
            puts "backend: #{CarbonFiber::Native.backend}"
            results = []
            Fiber.set_scheduler(CarbonFiber::Scheduler.new)
            3.times { |i| Fiber.schedule { sleep 0.01; results << i } }
            Fiber.scheduler.close
            raise "expected 3 fibers, got #{results.size}" unless results.size == 3
            puts "smoke test passed"
          '

      - uses: actions/upload-artifact@v7
        with:
          name: gems-arm64-darwin
          path: pkg/*.gem

  # Source gem: pure Ruby, works on all platforms without native extension
  source:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Build source gem
        run: bundle exec rake gem:source

      - name: Smoke-test installed gem
        run: |
          gem install pkg/carbon_fiber-*.gem --ignore-dependencies
          ruby -e '
            require "carbon_fiber"
            puts "backend: #{CarbonFiber::Native.backend}"
            results = []
            Fiber.set_scheduler(CarbonFiber::Scheduler.new)
            3.times { |i| Fiber.schedule { sleep 0.01; results << i } }
            Fiber.scheduler.close
            raise "expected 3 fibers, got #{results.size}" unless results.size == 3
            puts "smoke test passed"
          '

      - uses: actions/upload-artifact@v7
        with:
          name: gems-source
          path: pkg/*.gem

  # Cross-runner verification: install the precompiled arm64-darwin gem on a
  # fresh macos-latest runner (different VM than the one that built it) and
  # confirm dyld actually resolves @rpath/libruby.X.Y.dylib via the host
  # ruby's prefix. The build-job smoke test cannot catch a baked-in absolute
  # libruby path because it runs on the same runner where that path resolves.
  verify_macos:
    needs: [version, macos]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.4", "4.0"]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: gems-arm64-darwin
          path: pkg

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Install precompiled gem
        run: gem install pkg/carbon_fiber-*-arm64-darwin.gem

      - name: Inspect installed bundle
        run: |
          for f in $(gem env gemdir)/gems/carbon_fiber-*-arm64-darwin/lib/carbon_fiber/*/carbon_fiber_native.bundle; do
            echo "::group::$f"
            otool -L "$f"
            otool -l "$f" | grep -A2 LC_RPATH || true
            echo "::endgroup::"
          done

      - name: Smoke test on fresh runner
        run: |
          ruby -e '
            require "carbon_fiber"
            backend = CarbonFiber::Native.backend
            raise "expected libxev backend, got #{backend.inspect}" unless backend == "libxev"
            results = []
            Fiber.set_scheduler(CarbonFiber::Scheduler.new)
            3.times { |i| Fiber.schedule { sleep 0.01; results << i } }
            Fiber.scheduler.close
            raise "expected 3 fibers, got #{results.size}" unless results.size == 3
            puts "verify_macos: native bundle loaded and ran on fresh runner"
          '

  # Cross-runner verification: each matrix entry runs on a host whose
  # architecture and libc match the gem's platform, installs the
  # precompiled gem, and requires it. A wrong-arch or wrong-libc .so fails
  # dlopen, which native.rb propagates as LoadError. Musl variants drop
  # into an Alpine container via `docker run` rather than GHA's
  # `container:` because Node-based actions ship glibc binaries.
  verify_linux:
    needs: [version, linux]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: x86_64-linux,        runs-on: ubuntu-latest,    ruby: "3.4" }
          - { platform: x86_64-linux,        runs-on: ubuntu-latest,    ruby: "4.0" }
          - { platform: aarch64-linux,       runs-on: ubuntu-24.04-arm, ruby: "3.4" }
          - { platform: aarch64-linux,       runs-on: ubuntu-24.04-arm, ruby: "4.0" }
          - { platform: x86_64-linux-musl,   runs-on: ubuntu-latest,    ruby: "3.4", alpine: "3.4" }
          - { platform: x86_64-linux-musl,   runs-on: ubuntu-latest,    ruby: "4.0", alpine: "4.0" }
          - { platform: aarch64-linux-musl,  runs-on: ubuntu-24.04-arm, ruby: "3.4", alpine: "3.4" }
          - { platform: aarch64-linux-musl,  runs-on: ubuntu-24.04-arm, ruby: "4.0", alpine: "4.0" }
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: gems-${{ matrix.platform }}
          path: pkg

      - if: matrix.alpine == ''
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Smoke test (glibc, native)
        if: matrix.alpine == ''
        run: |
          gem install pkg/carbon_fiber-*-${{ matrix.platform }}.gem
          ruby -e '
            require "carbon_fiber"
            backend = CarbonFiber::Native.backend
            raise "expected libxev backend, got #{backend.inspect}" unless backend == "libxev"
            r = []
            Fiber.set_scheduler(CarbonFiber::Scheduler.new)
            3.times { |i| Fiber.schedule { sleep 0.01; r << i } }
            Fiber.scheduler.close
            raise "expected 3 fibers, got #{r.size}" unless r.size == 3
            puts "verify_linux ${{ matrix.platform }}/ruby${{ matrix.ruby }}: OK"
          '

      # Docker's default seccomp profile blocks io_uring_setup, which libxev
      # uses on Linux. seccomp=unconfined matches what a real Alpine host
      # would expose; this verify is standing in for one.
      - name: Smoke test (musl, Alpine container)
        if: matrix.alpine != ''
        run: |
          docker run --rm --security-opt seccomp=unconfined -v "$PWD:/work" -w /work ruby:${{ matrix.alpine }}-alpine sh -c '
            gem install pkg/carbon_fiber-*-${{ matrix.platform }}.gem
            ruby -e "
              require \"carbon_fiber\"
              backend = CarbonFiber::Native.backend
              raise \"expected libxev backend, got #{backend.inspect}\" unless backend == \"libxev\"
              r = []
              Fiber.set_scheduler(CarbonFiber::Scheduler.new)
              3.times { |i| Fiber.schedule { sleep 0.01; r << i } }
              Fiber.scheduler.close
              raise \"expected 3 fibers, got #{r.size}\" unless r.size == 3
              puts \"verify_linux ${{ matrix.platform }}/ruby${{ matrix.ruby }} (alpine): OK\"
            "
          '

  # Publish: create git tag + GitHub Release (atomic) + RubyGems
  publish:
    needs: [version, linux, macos, source, verify_linux, verify_macos]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - uses: actions/download-artifact@v8
        with:
          pattern: gems-*
          path: pkg
          merge-multiple: true

      - name: Extract changelog for this version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md > /tmp/release_notes.md
          cat /tmp/release_notes.md

      # Creates the git tag at github.sha and the GitHub Release in one call.
      # If this step fails, no tag is pushed — the orphan-tag risk is gone.
      - name: Create git tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.version.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "Carbon Fiber ${{ needs.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md \
            pkg/*.gem

      # rubygems/release-gem@v1 can't be used here — it runs `rake release`,
      # a Bundler-provided single-gem task that doesn't understand the pre-
      # built multi-platform artifacts in pkg/. Use the underlying OIDC
      # primitive directly and push each gem ourselves.
      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@main

      - name: Push gems to RubyGems
        run: |
          for gem in pkg/*.gem; do
            echo "Pushing ${gem}"
            gem push "${gem}"
          done
